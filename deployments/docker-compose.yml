services:
  postgres:
    image: postgres:15-alpine
    container_name: wa-server-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-wachat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wachat_secret}
      POSTGRES_DB: ${DB_NAME:-wa_gateway}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wachat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wa-server-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-wachat}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-wachat_secret}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wa-server-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-wachat_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
