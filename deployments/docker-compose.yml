version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wa-server-postgres
    environment:
      POSTGRES_USER: wachat
      POSTGRES_PASSWORD: wachat_secret
      POSTGRES_DB: wa_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wachat"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wa-server-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: wachat
      RABBITMQ_DEFAULT_PASS: wachat_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wa-server-redis
    command: redis-server --requirepass wachat_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data: